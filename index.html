    <!-- Structured Data: FAQ (curated subset) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the Cognitive Load Index (CLI)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The CLI is Shanti's stress score from 0–100. It is computed locally on your device using four signals: hours of screen time today, how fast you switch between tabs, the number of unique websites visited, and last night's sleep hours. No AI or server is involved — the formula runs entirely on your machine."
          }
        },
        {
          "@type": "Question",
          "name": "Is Shanti free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Shanti is completely free and open source. The source code is available on GitHub."
          }
        },
        {
          "@type": "Question",
          "name": "Does Shanti work without the desktop app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the website dashboard shows your historical stress trends, wellness log, and settings. However, real-time tab tracking and the breathing alarm require the desktop app."
          }
        },
        {
          "@type": "Question",
          "name": "How does Shanti detect stress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shanti monitors your tab switching frequency, unique websites visited, total screen time, and self-reported sleep hours. These four signals are combined into a Cognitive Load Index score from 0 to 100, updated every 30 seconds."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your tab titles and browsing data never leave your device. Only your stress score and self-reported data are stored in your account. Shanti has no analytics, no third-party trackers, and no ad networks."
          }
        },
        {
          "@type": "Question",
          "name": "How do I install the Shanti desktop app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On macOS, run: curl -fsSL https://mh3-project.vercel.app/install.sh | sh. On Windows, run: powershell -c \"irm https://mh3-project.vercel.app/install.ps1 | iex\". This clones the repo, builds the app from source, and launches it in your system tray."
          }
        },
        {
          "@type": "Question",
          "name": "What operating systems does Shanti support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shanti supports Windows (x64) and macOS (Intel and Apple Silicon). Linux support is coming soon."
          }
        }
      ]
    }
    </script>
