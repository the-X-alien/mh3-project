<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Rage Room</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; overflow: hidden; width: 100vw; height: 100vh; }
    #arena { position: relative; width: 100%; height: 100vh; background: radial-gradient(ellipse at center, #1a1d27 0%, #0f1117 100%); }
    .object { position: absolute; cursor: pointer; font-size: 48px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); transition: transform 0.1s; }
    .object:hover { transform: scale(1.15); background: rgba(255,255,255,0.08); }
    .object.breaking { pointer-events: none; animation: shatter 0.5s ease-out forwards; }
    @keyframes shatter { 0% { transform: scale(1); opacity: 1; } 30% { transform: scale(1.4); opacity: 0.8; } 100% { transform: scale(0.1) rotate(180deg); opacity: 0; } }
    .object.breaking::after { content: "💥"; position: absolute; font-size: 40px; animation: burst 0.6s ease-out forwards; }
    @keyframes burst { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    .debris { position: absolute; pointer-events: none; width: 12px; height: 12px; border-radius: 50%; animation: fly 0.8s ease-out forwards; }
    @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; } }
    #reset-btn { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #e6a817; border: none; color: #000; padding: 12px 32px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; z-index: 10; transition: opacity 0.2s; }
    #reset-btn:hover { opacity: 0.85; }
    #info { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #999; z-index: 10; text-align: center; }
    #reset-btn { font-family: 'Inter', -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="info">Click objects to smash them. Rage helps reset stress.</div>
  <div id="arena"></div>
  <button id="reset-btn">↻ Reset</button>
  <script type="module" src="./rage-room.js"></script>
</body>
</html>
